<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Analyzer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="header">
      <h1>Trading Analyzer</h1>
      <p>Track your trades</p>
    </div>
    <form id="login-form">
      <div class="field">
        <input type="email" id="email" placeholder="Email" required />
      </div>
      <div class="field">
        <input type="password" id="password" placeholder="Password" required />
      </div>
      <button type="submit" id="login-btn">Login</button>
      <button type="button" id="show-register">Create Account</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Register Screen -->
  <div id="register-screen" class="screen hidden">
    <div class="header">
      <h1>Create Account</h1>
    </div>
    <form id="register-form">
      <div class="field">
        <input type="email" id="reg-email" placeholder="Email" required />
      </div>
      <div class="field">
        <input type="password" id="reg-password" placeholder="Password" required />
      </div>
      <button type="submit" id="register-btn">Create Account</button>
      <button type="button" id="show-login">Back to Login</button>
      <p id="register-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="screen hidden">
    <div class="dash-header">
      <span id="user-email-display"></span>
      <button id="logout-btn">Logout</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="month">Month</button>
      <button class="tab" data-tab="all-time">All Time</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Net P&L</div>
        <div class="stat-value" id="stat-pnl">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="stat-winrate">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value" id="stat-trades">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Win</div>
        <div class="stat-value" id="stat-avg-win">—</div>
      </div>
    </div>

    <div class="section-title">Log Trade</div>
    <form id="trade-form">
      <div class="row">
        <input type="text" id="trade-symbol" placeholder="Symbol (e.g. NQ)" required />
        <select id="trade-side">
          <option value="long">Long</option>
          <option value="short">Short</option>
        </select>
      </div>
      <div class="row">
        <input type="number" id="trade-entry" placeholder="Entry Price" step="0.01" required />
        <input type="number" id="trade-exit" placeholder="Exit Price" step="0.01" />
      </div>
      <div class="row">
        <input type="number" id="trade-qty" placeholder="Qty / Contracts" step="0.01" required />
      </div>
      <input type="text" id="trade-notes" placeholder="Notes (optional)" />
      <button type="submit" id="log-trade-btn">Log Trade</button>
      <p id="trade-success" class="success hidden">Trade logged!</p>
      <p id="trade-error" class="error hidden"></p>
    </form>

    <div class="section-title" style="margin-top:12px;">API Key</div>
    <input type="password" id="anthropic-key-input" placeholder="Paste Anthropic key (sk-ant-...)" />
    <button id="save-key-btn" style="margin-top:4px;">Save Key</button>
    <p id="key-msg" class="hidden" style="font-size:11px;margin-top:4px;"></p>
  </div>

  <script src="lib/storage.js"></script>
  <script src="lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
